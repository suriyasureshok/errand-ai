name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Ensure dev tools are installed for CI
        pip install pytest pytest-asyncio black

    - name: Enforce Code Formatting (Black)
      run: |
        black --check src/

    - name: Execute Unit Test Suite
      # Run pytest and output standard coverage/status
      run: |
        pytest tests/ -v